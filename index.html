<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efe Abis Preisbewertung</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-800 antialiased font-sans selection:bg-indigo-100 selection:text-indigo-900">

    <div class="max-w-5xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <header class="bg-slate-900 text-white rounded-2xl p-6 shadow-lg mb-8 flex items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight flex items-center gap-3">
                <i class="fa-solidxl fa-solid fa-calculator text-indigo-400"></i> Efe Abis Preisbewertung
            </h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Eingabe-Formular -->
            <form id="calcForm" class="lg:col-span-2 space-y-6" onsubmit="event.preventDefault(); calculatePrice();">
                
                <!-- 1. Fahrzeugdaten -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-base font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">1. Fahrzeugdaten</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Erstzulassung</label>
                            <select id="erstzulassung" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="1997">1997</option>
                                <option value="1998">1998</option>
                                <option value="1999">1999</option>
                                <option value="2000">2000</option>
                                <option value="2001">2001</option>
                                <option value="2002">2002</option>
                                <option value="2003">2003</option>
                                <option value="2004">2004</option>
                                <option value="2005">2005</option>
                                <option value="2006">2006</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Kilometerstand</label>
                            <input type="number" id="kilometerstand" placeholder="z.B. 175000" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Hauptuntersuchung (HU)</label>
                            <select id="hu" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="neu">Neu (18-24 Monate)</option>
                                <option value="mittel">Mittel (6-17 Monate)</option>
                                <option value="kurz">Kurz (< 6 Monate)</option>
                                <option value="abgelaufen">Abgelaufen</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Motorisierung</label>
                            <select id="motor" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="1.4">1.4 16V (75 PS)</option>
                                <option value="1.6_8v">1.6 8V (101/102 PS)</option>
                                <option value="1.6_16v">1.6 16V (105 PS)</option>
                                <option value="1.8">1.8 20V (125 PS)</option>
                                <option value="1.8t">1.8 T (150/180 PS)</option>
                                <option value="2.0">2.0 8V (115 PS)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 2. Historie & Ausstattung -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-base font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">2. Historie & Ausstattung</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Vorbesitzer</label>
                            <select id="vorbesitzer" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="1-2">1 - 2 Besitzer</option>
                                <option value="3-4">3 - 4 Besitzer</option>
                                <option value="5+">5 oder mehr Besitzer</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Ausstattungslinie</label>
                            <select id="ausstattung" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="basis">Basis</option>
                                <option value="trendline">Trendline</option>
                                <option value="comfortline">Comfortline</option>
                                <option value="highline">Highline</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Karosserieform</label>
                            <select id="karosserie" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="3tuerer">3-Türer</option>
                                <option value="5tuerer">5-Türer</option>
                                <option value="variant">Kombi (Variant)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Zulassungsstatus</label>
                            <select id="zulassung" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="angemeldet">Angemeldet</option>
                                <option value="abgemeldet">Abgemeldet</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50">
                            <input type="checkbox" id="scheckheft" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 rounded border-slate-300">
                            <span class="text-sm font-medium">Scheckheftgepflegt</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50">
                            <input type="checkbox" id="unfallfrei" checked class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 rounded border-slate-300">
                            <span class="text-sm font-medium">Unfallfrei</span>
                        </label>
                    </div>
                </div>

                <!-- 3. Technik & Zustand -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-base font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">3. Technik & Zustand</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Zahnriemen & Wasserpumpe</label>
                            <select id="zahnriemen" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="neu">Nachweislich Neu (&lt; 40tkm / 4 Jahre)</option>
                                <option value="alt">Alt / Überfällig / Kein Nachweis</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Klimaanlage</label>
                            <select id="klima" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="funktioniert">Funktioniert einwandfrei</option>
                                <option value="defekt">Vorhanden, aber defekt</option>
                                <option value="keine">Nicht vorhanden</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Rostzustand</label>
                            <select id="rost" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="kein">Rostfrei / Absolut minimal</option>
                                <option value="kosmetisch">Kosmetisch (Kotflügel, Heckklappe)</option>
                                <option value="strukturell">Strukturell (Schweller durch / TÜV-Gefahr)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Bereifung (Anzahl & Zustand)</label>
                            <select id="bereifung" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="8fach_gut">8-fach bereift (Sommer & Winter gut)</option>
                                <option value="8fach_schlecht">8-fach bereift (Reifen alt/abgefahren)</option>
                                <option value="4fach_gut">4-fach bereift (Gutes Profil)</option>
                                <option value="4fach_schlecht">4-fach bereift (Müssen neu)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Elektronik (Fensterheber, ZV etc.)</label>
                            <select id="elektronik" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="ok">Alles funktioniert</option>
                                <option value="maengel">Mängel vorhanden (Mikroschalter, Fenster hakt)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Ölverbrauch</label>
                            <select id="oelverbrauch" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">Keine Angabe</option>
                                <option value="normal">Normal / Unauffällig</option>
                                <option value="hoch">Hoch (&gt; 0,5L / 1000km)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-5">
                        <label class="flex items-center gap-3 p-3 border border-red-200 bg-red-50 rounded-lg cursor-pointer hover:bg-red-100">
                            <input type="checkbox" id="akute_maengel" class="w-4 h-4 text-red-600 focus:ring-red-500 rounded border-red-300">
                            <span class="text-sm font-medium text-red-900">Bekannte akute technische Mängel (Bremse fällig, Auspuff ab, Fahrwerk schlägt)</span>
                        </label>
                    </div>
                </div>
            </form>

            <!-- Ergebnis-Anzeige -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-200 sticky top-6 text-center space-y-6">
                    <div>
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Realistischer Einkaufspreis</h3>
                        <div id="priceDisplay" class="text-5xl font-black text-slate-900 tracking-tight transition-all duration-300">
                            - €
                        </div>
                        <div id="priceRange" class="text-sm font-medium text-emerald-600 mt-2">
                            Bitte Daten eingeben
                        </div>
                    </div>

                    <div class="border-t border-slate-100 pt-4">
                        <div id="ratingBadge" class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-800">
                            Bewertung ausstehend
                        </div>
                    </div>

                    <!-- Strategischer Hinweis -->
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-left text-xs text-slate-600 space-y-2">
                        <h4 class="font-bold text-slate-900 flex items-center gap-1.5">
                            <i class="fa-solid fa-shield-halved text-indigo-500"></i>
                        </h4>
                        <p class="leading-relaxed">
                            Wenn Preis passt schreib Efe Abi an.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculatePrice() {
            // Extrem realistischer, knallhart kalkulierter Basiswert für den heutigen Markt (2026)
            let basePrice = 1400; 

            // 1. Motorisierung
            const motor = document.getElementById('motor').value;
            if (motor === '1.4') { basePrice -= 250; } 
            else if (motor === '1.6_8v') { basePrice += 150; } 
            else if (motor === '1.6_16v') { basePrice += 50; } 
            else if (motor === '1.8') { basePrice += 100; } 
            else if (motor === '1.8t') { basePrice += 800; } 
            else if (motor === '2.0') { basePrice += 50; }

            // 2. Erstzulassung
            const ez = document.getElementById('erstzulassung').value;
            if (ez) {
                const jahr = parseInt(ez);
                if (jahr <= 1999) { basePrice -= 100; }
                else if (jahr >= 2002) { basePrice += 150; }
            }

            // 3. Kilometerstand (Konservative und präzise Anpassung basierend auf 180.000 km Durchschnitt)
            const kmInput = document.getElementById('kilometerstand').value;
            if (kmInput) {
                const km = parseInt(kmInput);
                const kmDiff = 180000 - km;
                let kmMod = Math.round(kmDiff * 0.008); // 80€ pro 10.000 km Abweichung
                
                // Begrenzung um mathematische Ausreißer im Budgetsektor zu verhindern
                if (kmMod > 700) kmMod = 700;
                if (kmMod < -700) kmMod = -700;

                basePrice += kmMod;
            }

            // 4. HU (TÜV)
            const hu = document.getElementById('hu').value;
            if (hu === 'neu') { basePrice += 250; }
            else if (hu === 'kurz') { basePrice -= 200; }
            else if (hu === 'abgelaufen') { basePrice -= 600; }

            // 5. Historie & Ausstattung
            const vorbesitzer = document.getElementById('vorbesitzer').value;
            if (vorbesitzer === '1-2') { basePrice += 100; }
            else if (vorbesitzer === '5+') { basePrice -= 200; }

            const ausstattung = document.getElementById('ausstattung').value;
            if (ausstattung === 'basis') { basePrice -= 100; }
            else if (ausstattung === 'highline') { basePrice += 200; }

            const karosserie = document.getElementById('karosserie').value;
            if (karosserie === '3tuerer') { basePrice -= 50; }
            else if (karosserie === '5tuerer') { basePrice += 100; }

            const zulassung = document.getElementById('zulassung').value;
            if (zulassung === 'abgemeldet') { basePrice -= 50; }

            if (document.getElementById('scheckheft').checked) { basePrice += 150; }
            if (!document.getElementById('unfallfrei').checked) { basePrice -= 400; }

            // 6. Technik, Zustand & Bereifung (Präzise 8-fach Logik)
            const zahnriemen = document.getElementById('zahnriemen').value;
            if (zahnriemen === 'neu') { basePrice += 150; }
            else if (zahnriemen === 'alt') { basePrice -= 300; }

            const klima = document.getElementById('klima').value;
            if (klima === 'funktioniert') { basePrice += 150; }
            else if (klima === 'defekt') { basePrice -= 200; }
            else if (klima === 'keine') { basePrice -= 100; }

            const rost = document.getElementById('rost').value;
            if (rost === 'kein') { basePrice += 100; }
            else if (rost === 'kosmetisch') { basePrice -= 150; }
            else if (rost === 'strukturell') { basePrice -= 600; }

            // Bereifung-Update
            const bereifung = document.getElementById('bereifung').value;
            if (bereifung === '8fach_gut') { basePrice += 200; } // Erheblicher Sparvorteil, da kein zweiter Radsatz gekauft werden muss
            else if (bereifung === '8fach_schlecht') { basePrice += 50; } // Felgen vorhanden, aber Reifen Schrott
            else if (bereifung === '4fach_gut') { basePrice += 50; }
            else if (bereifung === '4fach_schlecht') { basePrice -= 150; }

            const elektronik = document.getElementById('elektronik').value;
            if (elektronik === 'maengel') { basePrice -= 100; }

            const oel = document.getElementById('oelverbrauch').value;
            if (oel === 'hoch') { basePrice -= 300; }

            if (document.getElementById('akute_maengel').checked) { basePrice -= 400; }

            // Untergrenze für fahrbereite, halbwegs intakte Fahrzeuge mit Substanz
            if (basePrice < 400) basePrice = 400;

            // UI Aktualisierung (Kalkulation bleibt im Hintergrund, wird nirgends ausgegeben)
            document.getElementById('priceDisplay').innerHTML = basePrice.toLocaleString('de-DE') + " €";
            
            const rangeMin = Math.round(basePrice * 0.95);
            const rangeMax = Math.round(basePrice * 1.05);
            document.getElementById('priceRange').innerHTML = `Ziel-Einkaufspanne: ${rangeMin.toLocaleString('de-DE')} € - ${rangeMax.toLocaleString('de-DE')} €`;

            // Badge Anpassung
            const badge = document.getElementById('ratingBadge');
            if (basePrice >= 1600) {
                badge.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800";
                badge.innerText = "Gute Substanz / Geringes Mängelrisiko";
            } else if (basePrice >= 1000 && basePrice < 1600) {
                badge.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-indigo-100 text-indigo-800";
                badge.innerText = "Solider Alltagsdeal / Normalzustand";
            } else {
                badge.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-800";
                badge.innerText = "Vorsicht: Erhöhtes Risiko für Folgekosten";
            }
        }

        // Event-Listener für Live-Kalkulation
        const inputs = document.querySelectorAll('#calcForm select, #calcForm input');
        inputs.forEach(el => {
            el.addEventListener('change', calculatePrice);
            if(el.type === 'number') el.addEventListener('input', calculatePrice);
        });

        // Initiale Ausführung beim Laden der Anwendung
        calculatePrice();
    </script>
</body>
</html>
